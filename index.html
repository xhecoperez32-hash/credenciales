<style>
*{box-sizing:border-box}

body{
    margin:0;

}

.login{

.botones{

.botones button{

.guardar{background:#16a34a;color:white}

#buscarEpc{

.barra-credencial button{
    margin-left:auto;

.subtabs{

}

.subtabs button{
    padding:6px 18px;
    border-radius:6px;

}

.subtabs button.active{
    background:#1A5372;

}

.credencial{
    width:1120px;
    height:520px;
    margin:auto;
    position:relative;
    overflow:hidden;
    background:#f2f2f2;
    border:1px solid #ddd;
}

.credencial::before{
    content:"";
    position:absolute;
    inset:0;
    background:repeating-radial-gradient(
        ellipse at 35% 50%,
        rgba(120,120,120,.18) 0px,
        rgba(120,120,120,.18) 1px,
        transparent 3px,
        transparent 14px
    );
    opacity:.7;
}

.credencial::after{
    content:"";
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    height:55px;
    background:#1A5372;
}

.frente,.atras{
    position:relative;
    z-index:2;
}

.titulo{

    color:#1A5372;

    font-weight:bold;

.dato{

    overflow-wrap:break-word;

.foto-frente{

    width:280px;

    border:3px solid #777;
    overflow:hidden;

.foto-frente img{

.atras-titulo{

.atras-operacion{

}

.atras-texto{

.azul{color:#1A5372}

.cuadro{

    height:230px;
    border:3px solid #777;
    display:flex;

}

.cuadro img{

}

#qrVisual{background:white}

.escanee{
    position:absolute;
    width:100%;
    text-align:center;
    top:455px;

    font-weight:bold;

.oculto{display:none}

@media print{
    body{background:white}
    .tabs,.barra-credencial,.subtabs{display:none}
    .pantalla{display:none!important}
    #pantallaCredencial{display:block!important}
    #panelFrente,#panelAtras{
        display:block!important;
        margin-top:20px;
    }
}
</style>
</head>

<script>
const SUPABASE_URL = "https://htthhjxlvvlcblbmelvf.supabase.co";
const SUPABASE_KEY = "sb_publishable_CjyA8MK4VMLbYd4_QizxxA_-sJE3v1V";
const db = supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let fotoBase64 = "";

function entrar(){
    const usuario = document.getElementById("loginUser").value.trim();
    const pass = document.getElementById("loginPass").value.trim();

    if(usuario === "admin" && pass === "fecopse123"){
        document.getElementById("login").style.display = "none";
        document.getElementById("app").style.display = "block";
    }else{
        alert("Usuario o contraseña incorrectos");
    }
}

document.getElementById("estatusCheck").addEventListener("change", function(){
    document.getElementById("estatusTexto").textContent = this.checked ? "ACTIVO" : "INACTIVO";
});

function epcCompleto(valor){
    valor=(valor||"").trim().toUpperCase();
    if(!valor)return "";
    if(valor.startsWith("EPC-")) return valor;
    return "EPC-" + valor;
}

function soloNumero(valor){
    return (valor||"").toUpperCase().replace("EPC-","");
}

function mostrarPantalla(tipo){
    document.getElementById("pantallaAdmin").classList.remove("active");
    document.getElementById("pantallaCredencial").classList.remove("active");
    document.getElementById("tabAdmin").classList.remove("active");
    document.getElementById("tabCredencial").classList.remove("active");

    if(tipo==="admin"){
        document.getElementById("pantallaAdmin").classList.add("active");
        document.getElementById("tabAdmin").classList.add("active");
    }else{
        document.getElementById("pantallaCredencial").classList.add("active");
        document.getElementById("tabCredencial").classList.add("active");
    }
}

function mostrarCredencial(tipo){
    document.getElementById("panelFrente").classList.add("oculto");
    document.getElementById("panelAtras").classList.add("oculto");
    document.getElementById("btnFrente").classList.remove("active");
    document.getElementById("btnAtras").classList.remove("active");

    if(tipo==="frente"){
        document.getElementById("panelFrente").classList.remove("oculto");
        document.getElementById("btnFrente").classList.add("active");
    }else{
        document.getElementById("panelAtras").classList.remove("oculto");
        document.getElementById("btnAtras").classList.add("active");
    }
}

async function listar(){
    const {data,error}=await db
    .from("credenciales")
    .select("*")
    .order("id",{ascending:true});

    if(error){
        alert(error.message);
        return;
    }

    const tabla=document.getElementById("tabla");
    tabla.innerHTML="";

    data.forEach(item=>{
        tabla.innerHTML += `
        <tr onclick='seleccionar(${JSON.stringify(item)})'>
            <td>${item.id||""}</td>
            <td>${item.epc||""}</td>
            <td>${item.nombre||""}</td>
            <td>${item.apellido||""}</td>
            <td>${item.estatus||""}</td>
            <td>${item.faltas||0}</td>
        </tr>`;
    });
}

function seleccionar(item){
    document.getElementById("id").value=item.id||"";
    document.getElementById("epc").value=soloNumero(item.epc);
    document.getElementById("nombre").value=item.nombre||"";
    document.getElementById("apellido").value=item.apellido||"";
    document.getElementById("giro").value=item.giro||"";
    document.getElementById("telefono").value=item.telefono||"";
    document.getElementById("direccion").value=item.direccion||"";
    document.getElementById("operacion_dias").value=item.operacion_dias||"";
    document.getElementById("operacion_horario").value=item.operacion_horario||"";
    document.getElementById("vigencia").value=item.vigencia||"";
    document.getElementById("faltas").value=item.faltas||0;

    const activo = (item.estatus||"ACTIVO").toUpperCase() === "ACTIVO";
    document.getElementById("estatusCheck").checked = activo;
    document.getElementById("estatusTexto").textContent = activo ? "ACTIVO" : "INACTIVO";

    fotoBase64=item.foto_base64||"";
    mostrarFotoAdmin(fotoBase64);
}

function cargarFoto(event){
    const file=event.target.files[0];
    if(!file)return;

    const reader=new FileReader();
    reader.onload=function(e){
        fotoBase64=e.target.result;
        mostrarFotoAdmin(fotoBase64);
    };
    reader.readAsDataURL(file);
}

function mostrarFotoAdmin(base64){
    const box=document.getElementById("previewFoto");
    box.innerHTML = base64 ? `<img src="${base64}">` : "FOTO";
}

function datosFormulario(){
    const faltas = parseInt(document.getElementById("faltas").value || "0");
    let estatus = document.getElementById("estatusCheck").checked ? "ACTIVO" : "INACTIVO";

    if(faltas >= 3){
        estatus = "INACTIVO";
    }

    return{
        epc:epcCompleto(document.getElementById("epc").value),
        nombre:document.getElementById("nombre").value,
        apellido:document.getElementById("apellido").value,
        organizacion:"EL PODER DEL COMERCIO",
        giro:document.getElementById("giro").value,
        estatus:estatus,
        faltas:faltas,
        telefono:document.getElementById("telefono").value,
        direccion:document.getElementById("direccion").value,
        operacion_dias:document.getElementById("operacion_dias").value,
        operacion_horario:document.getElementById("operacion_horario").value,
        vigencia:document.getElementById("vigencia").value,
        foto_base64:fotoBase64
    };
}

async function agregar(){
    const nuevo=datosFormulario();

    if(!nuevo.epc || !nuevo.nombre){
        alert("EPC y nombre son obligatorios");
        return;
    }

    const {error}=await db
    .from("credenciales")
    .insert([nuevo]);

    if(error){
        alert(error.message);
        return;
    }

    alert("Registro agregado");
    limpiar();
    listar();
}

async function buscarAdmin(){
    const epc=epcCompleto(document.getElementById("epc").value);

    const {data,error}=await db
    .from("credenciales")
    .select("*")
    .eq("epc",epc)
    .single();

    if(error){
        alert("No encontrado");
        return;
    }

    seleccionar(data);
}

async function actualizar(){
    const id=document.getElementById("id").value;

    if(!id){
        alert("Selecciona un registro");
        return;
    }

    const actualizado=datosFormulario();

    const {error}=await db
    .from("credenciales")
    .update(actualizado)
    .eq("id",id);

    if(error){
        alert(error.message);
        return;
    }

    alert("Actualizado");
    limpiar();
    listar();
}

async function eliminar(){
    const id=document.getElementById("id").value;

    if(!id){
        alert("Selecciona uno");
        return;
    }

    if(!confirm("¿Eliminar registro?")) return;

    const {error}=await db
    .from("credenciales")
    .delete()
    .eq("id",id);

    if(error){
        alert(error.message);
        return;
    }

    alert("Eliminado");
    limpiar();
    listar();
}

async function registrarFalta(){
    const id=document.getElementById("id").value;

    if(!id){
        alert("Busca o selecciona una credencial primero");
        return;
    }

    let faltas = parseInt(document.getElementById("faltas").value || "0");
    faltas++;

    let estatus = document.getElementById("estatusCheck").checked ? "ACTIVO" : "INACTIVO";

    if(faltas === 2){
        alert("ALERTA: Esta persona tiene 2 faltas. Con una más se inactiva.");
    }

    if(faltas >= 3){
        estatus = "INACTIVO";
        document.getElementById("estatusCheck").checked = false;
        document.getElementById("estatusTexto").textContent = "INACTIVO";
        alert("La credencial se inactivó automáticamente por 3 faltas.");
    }

    const {error}=await db
    .from("credenciales")
    .update({faltas:faltas, estatus:estatus})
    .eq("id",id);

    if(error){
        alert(error.message);
        return;
    }

    document.getElementById("faltas").value = faltas;
    listar();
}

async function quitarFalta(){
    const id=document.getElementById("id").value;

    if(!id){
        alert("Busca o selecciona una credencial primero");
        return;
    }

    let faltas = parseInt(document.getElementById("faltas").value || "0");
    if(faltas > 0) faltas--;

    const estatus = faltas >= 3 ? "INACTIVO" : "ACTIVO";

    const {error}=await db
    .from("credenciales")
    .update({faltas:faltas, estatus:estatus})
    .eq("id",id);

    if(error){
        alert(error.message);
        return;
    }

    document.getElementById("faltas").value = faltas;
    document.getElementById("estatusCheck").checked = estatus === "ACTIVO";
    document.getElementById("estatusTexto").textContent = estatus;
    listar();
}

function limpiar(){
    document.getElementById("id").value="";
    document.getElementById("epc").value="";
    document.getElementById("nombre").value="";
    document.getElementById("apellido").value="";
    document.getElementById("giro").value="";
    document.getElementById("telefono").value="";
    document.getElementById("direccion").value="";
    document.getElementById("operacion_dias").value="";
    document.getElementById("operacion_horario").value="";
    document.getElementById("vigencia").value="";
    document.getElementById("faltas").value="0";
    document.getElementById("estatusCheck").checked=true;
    document.getElementById("estatusTexto").textContent="ACTIVO";
    document.getElementById("fotoInput").value="";
    fotoBase64="";
    mostrarFotoAdmin("");
}

function enterBuscar(event){
    if(event.key==="Enter"){
        buscarCredencial();
    }

    const permitidos=["Backspace","Delete","ArrowLeft","ArrowRight","Tab","Enter"];

    if(!permitidos.includes(event.key) && !/^[0-9]$/.test(event.key)){
        event.preventDefault();
    }
}

async function buscarCredencial(){
    const numero=document.getElementById("buscarEpc").value.trim();
    const epc=epcCompleto(numero);

    const {data,error}=await db
    .from("credenciales")
    .select("*")
    .eq("epc",epc)
    .single();

    if(error){
        alert("No encontrado");
        limpiarCredencial();
        return;
    }

    document.getElementById("vNombre").textContent=`${data.nombre||""} ${data.apellido||""}`;
    document.getElementById("vOrganizacion").textContent="EL PODER DEL COMERCIO";
    document.getElementById("vGiro").textContent=data.giro||"";
    document.getElementById("vEstatus").textContent=data.estatus||"";
    document.getElementById("vDireccion").textContent=data.direccion||"";
    document.getElementById("vVigencia").textContent="VIGENCIA " + (data.vigencia||"");
    document.getElementById("vOperacion").textContent="OPERACIÓN DE " + (data.operacion_horario||"") + " DE " + (data.operacion_dias||"");

    const estado=(data.estatus||"").toUpperCase();
    const estadoAtras=document.getElementById("vEstadoAtras");
    estadoAtras.textContent=estado;
    estadoAtras.style.color = estado === "ACTIVO" ? "#16a34a" : "#dc2626";

    const foto=document.getElementById("vFoto");
    foto.innerHTML = data.foto_base64 ? `<img src="${data.foto_base64}">` : "SIN FOTO";

    const qr=document.getElementById("qrVisual");
    qr.innerHTML="";

    new QRCode(qr,{
        text:soloNumero(data.epc),
        width:190,
        height:190
    });

    mostrarCredencial("frente");
}

function limpiarCredencial(){
    document.getElementById("vNombre").textContent="";
    document.getElementById("vOrganizacion").textContent="";
    document.getElementById("vGiro").textContent="";
    document.getElementById("vEstatus").textContent="";
    document.getElementById("vDireccion").textContent="";
    document.getElementById("vVigencia").textContent="VIGENCIA";
    document.getElementById("vOperacion").textContent="OPERACIÓN";
    document.getElementById("vFoto").innerHTML="FOTO";
    document.getElementById("qrVisual").innerHTML="";
}
</script>
